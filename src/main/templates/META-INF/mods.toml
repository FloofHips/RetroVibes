modLoader="javafml"

loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]

modId="${mod_id}"

version="${mod_version}"
side="CLIENT"
displayName="${mod_name}"

authors="FloofHips"

description='''
Minor changes to lighting to mimic early versions of the game
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="[${forge_version},)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
